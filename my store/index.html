<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Page with 3D & AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Model Viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f3f6;
}

/* Header */
.header {
    background: #2874f0;
    color: white;
    padding: 15px;
    font-size: 20px;
}

/* Container */
.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

/* Left side (product + 3D) */
.left {
    width: 50%;
    background: white;
    padding: 20px;
    border-radius: 8px;
}

/* Right side (details) */
.right {
    width: 50%;
    background: white;
    padding: 20px;
    border-radius: 8px;
}

/* Buttons */
.btn {
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
    font-size: 16px;
}

.cart {
    background: orange;
    color: white;
}

.buy {
    background: green;
    color: white;
}

/* 3D viewer */
model-viewer {
    width: 100%;
    height: 400px;
    background: #eee;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">MyStore </div>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h2> 3D Preview</h2>

        <model-viewer 
            src="https://cdn.jsdelivr.net/gh/mrmansoor360-hue/my-store/my%20store/free_bmw_m3_e30.glb"
            alt="3D Product"
            auto-rotate 
            camera-controls 
            ar
            ar-modes="webxr scene-viewer quick-look"
            shadow-intensity="1">
        </model-viewer>

        <p>👉 Drag to rotate | Pinch to zoom | Tap AR to view in real space</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h1>iPhone Style Phone</h1>
        <h2>₹79,999</h2>

        <p>
            - 8GB RAM <br>
            - 128GB Storage <br>
            - AMOLED Display <br>
            - 5000mAh Battery
        </p>

        <button class="btn cart">Add to Cart</button><br>
        <button class="btn buy">Buy Now</button>
    </div>

</div>

</body>
</html>
